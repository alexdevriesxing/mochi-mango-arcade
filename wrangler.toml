name = "mochi-mango-arcade"
compatibility_date = "2026-07-13"
main = "src/worker.js"
assets = { directory = "./public", binding = "ASSETS", not_found_handling = "404-page", html_handling = "force-trailing-slash", run_worker_first = true }
workers_dev = true

# www first: wrangler dev simulates the first route's hostname, and the worker
# 301s the apex to www — apex-first makes every local request redirect forever.
routes = [
  { pattern = "www.mochimangoarcade.com", custom_domain = true },
  { pattern = "mochimangoarcade.com", custom_domain = true }
]

[observability]
enabled = true

[[d1_databases]]
binding = "PROFILES_DB"
database_name = "mochi-mango-arcade-profiles"
database_id = "7d9fa6d4-8748-4058-90e2-037b987801d9"
