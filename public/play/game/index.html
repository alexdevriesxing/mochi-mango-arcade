<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#120A24;overflow:hidden;font-family:'Outfit',sans-serif}
#gameCanvas{display:block;width:100vw;height:100vh}
#ui{position:absolute;top:0;left:0;right:0;padding:16px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
#score{color:#fff;font-size:24px;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.5)}
#lives{color:#FF4F9A;font-size:20px}
#overlay{position:absolute;inset:0;background:rgba(18,10,36,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff;text-align:center;padding:20px}
#overlay h1{font-size:36px;margin-bottom:8px;color:#FF4F9A}
#overlay p{font-size:16px;max-width:400px;margin-bottom:20px;opacity:.85;line-height:1.5}
#overlay button{background:linear-gradient(135deg,#FF4F9A,#FF2A54);color:#fff;border:0;border-radius:99px;padding:14px 32px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 8px 24px rgba(255,79,154,.3);transition:transform .2s}
#overlay button:hover{transform:translateY(-2px) scale(1.05)}
#overlay .hint{margin-top:16px;font-size:13px;opacity:.6}
.hidden{display:none!important}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
<div id="score">Score: 0</div>
<div id="lives">♥♥♥</div>
</div>
<div id="overlay">
<h1 id="gameTitle">Mochi Mango Arcade</h1>
<p id="gameDesc">Collect stars and avoid obstacles!</p>
<button id="startBtn">▶ Play Now</button>
<div class="hint">Tap/Click or press SPACE to jump · Move with arrows</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');
const scoreEl=document.getElementById('score');
const livesEl=document.getElementById('lives');

const params=new URLSearchParams(location.search);
const title=params.get('title')||'Mochi Mango Arcade';
const genre=params.get('genre')||'Arcade';
document.getElementById('gameTitle').textContent=title;
document.getElementById('gameDesc').textContent=`${genre} game! Collect stars, avoid obstacles, and beat your high score!`;

let W,H,player,obstacles,collectibles,particles,score,lives,gameOver,gameStarted,speed,gravity,jumping,frameCount;
const COLORS={pink:'#FF4F9A',orange:'#FF9F1C',yellow:'#FFD166',purple:'#8A5CFF',blue:'#4FC0FF',green:'#4FE0A0',red:'#FF2A54'};

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

function init(){
score=0;lives=3;gameOver=false;frameCount=0;speed=4;gravity=0.7;
player={x:120,y:H-100,vy:0,w:40,h:40,onGround:true,color:COLORS.pink,trail:[]};
obstacles=[];collectibles=[];particles=[];
updateUI();
}

function updateUI(){
scoreEl.textContent='Score: '+score;
livesEl.textContent='♥'.repeat(Math.max(0,lives))+'♡'.repeat(Math.max(0,3-lives));
}

function spawnObstacle(){
const types=['rock','spike','pit'];
const type=types[Math.floor(Math.random()*types.length)];
obstacles.push({x:W+50,y:H-60,w:30+Math.random()*30,h:30+Math.random()*20,type,color:COLORS.red});
}

function spawnCollectible(){
collectibles.push({x:W+50,y:H-80-Math.random()*120,w:24,h:24,color:COLORS.yellow,rot:0});
}

function spawnParticle(x,y,color){
for(let i=0;i<8;i++){
particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-2,life:30,color,size:3+Math.random()*4});
}
}

function jump(){
if(player.onGround&&!gameOver){
player.vy=-14;player.onGround=false;spawnParticle(player.x+player.w/2,player.y+player.h,COLORS.purple);
}
}

function input(e){
if(!gameStarted||gameOver)return;
if(e.code==='Space'||e.type==='pointerdown'){e.preventDefault();jump()}
}

function rectCollide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}

function update(){
frameCount++;
if(frameCount%60===0)speed+=0.1;

if(!player.onGround){
player.vy+=gravity;
player.y+=player.vy;
if(player.y>=H-100){player.y=H-100;player.vy=0;player.onGround=true}
}

player.trail.push({x:player.x,y:player.y});
if(player.trail.length>8)player.trail.shift();

if(frameCount%90===0)spawnObstacle();
if(frameCount%60===0)spawnCollectible();

obstacles.forEach((o,i)=>{
o.x-=speed;
if(rectCollide(player,o)){
obstacles.splice(i,1);
lives--;updateUI();spawnParticle(player.x,player.y,COLORS.red);
if(lives<=0){gameOver=true;showGameOver()}
}
if(o.x<-100)obstacles.splice(i,1);
});

collectibles.forEach((c,i)=>{
c.x-=speed;c.rot+=0.1;
if(rectCollide(player,c)){
collectibles.splice(i,1);
score+=10;updateUI();spawnParticle(c.x,c.y,COLORS.yellow);
}
if(c.x<-100)collectibles.splice(i,1);
});

particles.forEach((p,i)=>{
p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;
if(p.life<=0)particles.splice(i,1);
});
}

function draw(){
const grd=ctx.createLinearGradient(0,0,0,H);
grd.addColorStop(0,'#1a0f2e');grd.addColorStop(1,'#0d0719');
ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

ctx.fillStyle='rgba(255,255,255,.08)';
for(let i=0;i<3;i++){
const x=(frameCount*0.5+i*300)%(W+300)-150;
ctx.beginPath();ctx.arc(x,H-150-i*60,30+Math.random()*20,0,Math.PI*2);ctx.fill();
}

ctx.fillStyle='rgba(138,92,255,.15)';
ctx.fillRect(0,H-60,W,60);
ctx.fillStyle='rgba(255,79,154,.2)';
ctx.fillRect(0,H-60,W,4);

player.trail.forEach((t,i)=>{
ctx.globalAlpha=(i/player.trail.length)*0.3;
ctx.fillStyle=player.color;
ctx.beginPath();ctx.arc(t.x+player.w/2,t.y+player.h/2,player.w/2,0,Math.PI*2);ctx.fill();
});
ctx.globalAlpha=1;

ctx.fillStyle=player.color;
ctx.beginPath();ctx.arc(player.x+player.w/2,player.y+player.h/2,player.w/2,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#fff';
ctx.beginPath();ctx.arc(player.x+15,player.y-5,4,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(player.x+25,player.y-5,4,0,Math.PI*2);ctx.fill();

obstacles.forEach(o=>{
ctx.fillStyle=o.color;
ctx.beginPath();
ctx.moveTo(o.x,o.y+o.h);ctx.lineTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w,o.y+o.h);
ctx.closePath();ctx.fill();
});

collectibles.forEach(c=>{
ctx.save();ctx.translate(c.x+c.w/2,c.y+c.h/2);ctx.rotate(c.rot);
ctx.fillStyle=c.color;
ctx.beginPath();
for(let i=0;i<5;i++){
const a=(i*2*Math.PI)/5-Math.PI/2;
const r=i%2===0?c.w/2:c.w/4;
ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
}
ctx.closePath();ctx.fill();ctx.restore();
});

particles.forEach(p=>{
ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;
ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
});
ctx.globalAlpha=1;

if(gameStarted&&!gameOver)ctx.fillStyle='rgba(255,255,255,.05)';
}

function showGameOver(){
overlay.classList.remove('hidden');
overlay.querySelector('h1').textContent='Game Over!';
overlay.querySelector('p').textContent=`Final Score: ${score} · Great job!`;
startBtn.textContent='▶ Play Again';
}

function loop(){
if(gameStarted&&!gameOver){update()}
draw();
requestAnimationFrame(loop);
}

startBtn.addEventListener('click',()=>{
init();gameStarted=true;overlay.classList.add('hidden');
});

document.addEventListener('keydown',input);
canvas.addEventListener('pointerdown',input);

init();loop();
</script>
</body>
</html>
