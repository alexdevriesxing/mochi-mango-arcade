<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a5a3d"/>
      <stop offset="100%" stop-color="#3a4a2a"/>
    </linearGradient>
    <linearGradient id="glow" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#a8c97e" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#a8c97e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="480" rx="16" fill="url(#bg)"/>
  <rect x="8" y="8" width="304" height="464" rx="12" fill="none" stroke="#a8c97e" stroke-width="1" opacity=".25"/>
  <rect x="0" y="0" width="320" height="240" fill="url(#glow)"/>
  <!-- top icon -->
  <text x="160" y="52" text-anchor="middle" fill="#a8c97e" font-size="14" font-weight="600" font-family="Outfit,sans-serif" opacity=".6">TABLETOP KINGDOM</text>
  <!-- main symbol -->
  <g transform="translate(160,170)">
    <text y="0" text-anchor="middle" fill="#a8c97e" font-size="80" font-family="serif" opacity=".9">⬡</text>
    <circle cx="0" cy="4" r="58" fill="none" stroke="#a8c97e" stroke-width=".5" opacity=".12"/>
  </g>
  <!-- title -->
  <text x="160" y="280" text-anchor="middle" fill="#a8c97e" font-size="20" font-weight="700" font-family="Fredoka,Outfit,sans-serif">Hexbridge Heroes</text>
  <text x="160" y="304" text-anchor="middle" fill="#c0d89a" font-size="12" font-family="Outfit,sans-serif" text-transform="uppercase">hex</text>
  <!-- separator -->
  <line x1="80" y1="322" x2="240" y2="322" stroke="#a8c97e" stroke-width=".5" opacity=".2"/>
  <!-- bottom info -->
  <text x="160" y="420" text-anchor="middle" fill="#c0d89a" font-size="12" font-family="Outfit,sans-serif">Hexa Knight</text>
  <text x="160" y="450" text-anchor="middle" fill="#a8c97e" font-size="11" font-family="Outfit,sans-serif" opacity=".45">MOCHI MANGO ARCADE</text>
  <!-- ornamental frame dots -->
  <circle cx="16" cy="16" r="2" fill="#a8c97e" opacity=".15"/>
  <circle cx="304" cy="16" r="2" fill="#a8c97e" opacity=".15"/>
  <circle cx="16" cy="464" r="2" fill="#a8c97e" opacity=".15"/>
  <circle cx="304" cy="464" r="2" fill="#a8c97e" opacity=".15"/>
</svg>