<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a3d3d"/>
      <stop offset="100%" stop-color="#4a2a2a"/>
    </linearGradient>
    <linearGradient id="glow" x1=".5" y1="0" x2=".5" y2="1">
      <stop offset="0%" stop-color="#f08787" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#f08787" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="320" height="480" rx="16" fill="url(#bg)"/>
  <rect x="8" y="8" width="304" height="464" rx="12" fill="none" stroke="#f08787" stroke-width="1" opacity=".25"/>
  <rect x="0" y="0" width="320" height="240" fill="url(#glow)"/>
  <!-- top icon -->
  <text x="160" y="52" text-anchor="middle" fill="#f08787" font-size="14" font-weight="600" font-family="Outfit,sans-serif" opacity=".6">TABLETOP KINGDOM</text>
  <!-- main symbol -->
  <g transform="translate(160,170)">
    <text y="0" text-anchor="middle" fill="#f08787" font-size="80" font-family="serif" opacity=".9">✧</text>
    <circle cx="0" cy="4" r="58" fill="none" stroke="#f08787" stroke-width=".5" opacity=".12"/>
  </g>
  <!-- title -->
  <text x="160" y="280" text-anchor="middle" fill="#f08787" font-size="20" font-weight="700" font-family="Fredoka,Outfit,sans-serif">Petal Five</text>
  <text x="160" y="304" text-anchor="middle" fill="#f0a8a8" font-size="12" font-family="Outfit,sans-serif" text-transform="uppercase">gomoku</text>
  <!-- separator -->
  <line x1="80" y1="322" x2="240" y2="322" stroke="#f08787" stroke-width=".5" opacity=".2"/>
  <!-- bottom info -->
  <text x="160" y="420" text-anchor="middle" fill="#f0a8a8" font-size="12" font-family="Outfit,sans-serif">Petal Prime</text>
  <text x="160" y="450" text-anchor="middle" fill="#f08787" font-size="11" font-family="Outfit,sans-serif" opacity=".45">MOCHI MANGO ARCADE</text>
  <!-- ornamental frame dots -->
  <circle cx="16" cy="16" r="2" fill="#f08787" opacity=".15"/>
  <circle cx="304" cy="16" r="2" fill="#f08787" opacity=".15"/>
  <circle cx="16" cy="464" r="2" fill="#f08787" opacity=".15"/>
  <circle cx="304" cy="464" r="2" fill="#f08787" opacity=".15"/>
</svg>