    <line x1="75" y1="360" x2="645" y2="360" stroke="#39ffde" stroke-width="1"/>
  </g>
  <g opacity=".08">
    <line x1="230" y1="45" x2="230" y2="415" stroke="#ff4f9a" stroke-width="1"/>
    <line x1="360" y1="45" x2="360" y2="415" stroke="#ff4f9a" stroke-width="1"/>
    <line x1="490" y1="45" x2="490" y2="415" stroke="#ff4f9a" stroke-width="1"/>
  </g>
  <g filter="url(#staticGlow)">
