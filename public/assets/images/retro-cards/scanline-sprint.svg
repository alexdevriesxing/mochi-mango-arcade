<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Scanline Sprint key art</title><desc id="desc">Scan Sam falls through CRT scanlines dodging static interference in this retro helix drop.</desc>
  <defs><linearGradient id="bg" x2="0" y2="1"><stop stop-color="#050510"/><stop offset="1" stop-color="#150828"/></linearGradient><pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0 3.5h4" stroke="#fff" stroke-opacity=".06"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="staticGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="720" height="450" fill="url(#bg)"/>
  <rect x="60" y="30" width="600" height="400" rx="20" fill="#0a0a18" stroke="#39ffde" stroke-width="2"/>
  <rect x="75" y="45" width="570" height="370" rx="4" fill="#0f0f20"/>
  <g opacity=".15">
