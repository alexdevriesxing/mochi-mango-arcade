<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">8-Bit Bakery key art</title><desc id="desc">Chip the Baker runs a pixel-perfect bakery serving hungry patrons in this retro time-management game.</desc>
  <defs><linearGradient id="bg" x2="0" y2="1"><stop stop-color="#120a14"/><stop offset="1" stop-color="#201028"/></linearGradient><pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0 3.5h4" stroke="#fff" stroke-opacity=".04"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="warmGlow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="720" height="450" fill="url(#bg)"/>
  <rect x="0" y="280" width="720" height="170" fill="#1a1022"/>
  <line x1="0" y1="280" x2="720" y2="280" stroke="#ffcf40" stroke-width="2" opacity=".3"/>
  <rect x="60" y="240" width="600" height="40" rx="4" fill="#2a1830" stroke="#ffcf40" stroke-width="1.5"/>
  <rect x="80" y="248" width="80" height="24" rx="3" fill="#3a2040"/>
  <rect x="300" y="248" width="100" height="24" rx="3" fill="#3a2040"/>
