    <rect x="530" y="288" width="45" height="42" rx="4" fill="#ffcf40" opacity=".3"/>
  </g>
  <g filter="url(#glow)">
    <rect x="105" y="295" width="30" height="20" rx="3" fill="#ffcf40"/>
    <rect x="330" y="300" width="30" height="15" rx="3" fill="#ffcf40"/>
    <rect x="540" y="295" width="25" height="18" rx="3" fill="#ffcf40"/>
    <circle cx="120" cy="305" r="4" fill="#ff4f9a"/>
    <circle cx="345" cy="308" r="3" fill="#ff4f9a"/>
    <circle cx="552" cy="304" r="3" fill="#ff4f9a"/>
  </g>
  <g font-family="monospace" font-size="10" fill="#ffcf40" opacity=".6">
