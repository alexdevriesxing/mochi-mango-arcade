  <rect x="30" y="24" width="160" height="28" rx="14" fill="#ffcf40"/><text x="110" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#120a14" letter-spacing="2">RETRO · 90s</text>
  <text x="36" y="408" font-family="Arial Black,Arial,sans-serif" font-size="34" font-weight="900" fill="#f7fbff" letter-spacing="1">8-BIT</text><text x="36" y="444" font-family="Arial Black,Arial,sans-serif" font-size="34" font-weight="900" fill="#ffcf40" letter-spacing="1">BAKERY</text>
