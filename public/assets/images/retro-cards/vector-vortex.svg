    <polygon points="90,340 130,310 170,340 130,370" fill="none" stroke="#ffcf40" stroke-width="3" opacity=".6"/>
    <polygon points="550,350 580,320 610,350 580,380" fill="none" stroke="#39ffde" stroke-width="3" opacity=".5"/>
    <polygon points="200,40 220,20 240,40 220,60" fill="none" stroke="#ff4f9a" stroke-width="2" opacity=".6"/>
    <polygon points="640,280 660,260 680,280 660,300" fill="none" stroke="#39ffde" stroke-width="2" opacity=".5"/>
  </g>
  <g filter="url(#glow)">
    <polygon points="250,170 300,140 350,170 300,200" fill="none" stroke="#ff4f9a" stroke-width="4"/>
    <polygon points="430,100 470,80 510,100 470,120" fill="none" stroke="#ffcf40" stroke-width="3"/>
    <polygon points="150,230 180,210 210,230 180,250" fill="none" stroke="#39ffde" stroke-width="3"/>
    <polygon points="560,180 590,160 620,180 590,200" fill="none" stroke="#ffcf40" stroke-width="3"/>
    <polygon points="320,310 350,290 380,310 350,330" fill="none" stroke="#ff4f9a" stroke-width="3"/>
    <polygon points="450,270 480,250 510,270 480,290" fill="none" stroke="#39ffde" stroke-width="3"/>
  </g>
  <g transform="translate(360 235)" filter="url(#glow)">
    <polygon points="0,-50 30,20 0,10 -30,20" fill="#191034" stroke="#39ffde" stroke-width="4"/>
    <polygon points="0,-30 12,15 -12,15" fill="#39ffde" opacity=".6"/>
