    <path d="M-20 25l-8 20M20 25l8 20" stroke="#ffcf40" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g fill="#f7fbff" opacity=".7"><circle cx="70" cy="50" r="2"/><circle cx="650" cy="45" r="3"/><circle cx="680" cy="400" r="2"/><circle cx="45" cy="420" r="2"/><circle cx="400" cy="420" r="2"/></g>
  <rect x="30" y="24" width="160" height="28" rx="14" fill="#39ffde"/><text x="110" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#050510" letter-spacing="2">RETRO · 70s</text>
  <text x="36" y="408" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#f7fbff" letter-spacing="1">VECTOR</text><text x="36" y="444" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#ffcf40" letter-spacing="1">VORTEX</text>
  <rect width="720" height="450" rx="28" fill="url(#scan)"/><rect x="8" y="8" width="704" height="434" rx="23" fill="none" stroke="#ff4f9a" stroke-width="3"/>
