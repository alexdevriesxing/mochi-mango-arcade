<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
  <title id="title">Vector Vortex key art</title><desc id="desc">Vertex Viper weaves through a storm of geometric enemies in pure vector-graphics space.</desc>
  <defs><linearGradient id="bg" x2="0" y2="1"><stop stop-color="#050510"/><stop offset="1" stop-color="#0f0525"/></linearGradient><pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0 3.5h4" stroke="#fff" stroke-opacity=".04"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="trace"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="720" height="450" fill="url(#bg)"/>
  <g stroke-opacity=".08" stroke="#39ffde" stroke-width="1"><line x1="0" y1="225" x2="720" y2="225"/><line x1="360" y1="0" x2="360" y2="450"/></g>
