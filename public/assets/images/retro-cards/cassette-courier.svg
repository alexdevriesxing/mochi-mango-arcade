<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Cassette Courier key art</title><desc id="desc">Flip the Fox races through a neon-lit 80s suburb delivering cassette tapes in this retro runner.</desc>
  <defs><linearGradient id="bg" x2="0" y2="1"><stop stop-color="#0f0a1a"/><stop offset="1" stop-color="#1f1040"/></linearGradient><pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0 3.5h4" stroke="#fff" stroke-opacity=".05"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="trace"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="720" height="450" fill="url(#bg)"/>
  <rect x="0" y="310" width="720" height="140" fill="#0d0820"/>
  <line x1="0" y1="310" x2="720" y2="310" stroke="#39ffde" stroke-width="2" opacity=".4"/>
  <g filter="url(#trace)" opacity=".5">
    <rect x="80" y="280" width="40" height="30" fill="none" stroke="#ff4f9a" stroke-width="2"/>
    <rect x="200" y="275" width="35" height="35" fill="none" stroke="#ffcf40" stroke-width="2"/>
    <rect x="400" y="285" width="30" height="25" fill="none" stroke="#39ffde" stroke-width="2"/>
    <rect x="550" y="278" width="45" height="32" fill="none" stroke="#ff4f9a" stroke-width="2"/>
  </g>
  <rect x="70" y="320" width="18" height="40" rx="3" fill="#2a1a40" stroke="#ffcf40" stroke-width="2"/>
  <rect x="630" y="318" width="20" height="42" rx="3" fill="#2a1a40" stroke="#ffcf40" stroke-width="2"/>
  <line x1="88" y1="360" x2="70" y2="360" stroke="#ffcf40" stroke-width="3" stroke-linecap="round"/>
  <line x1="650" y1="360" x2="670" y2="360" stroke="#ffcf40" stroke-width="3" stroke-linecap="round"/>
  <g filter="url(#glow)">
    <rect x="120" y="325" width="30" height="20" rx="2" fill="#ff4f9a" stroke="#fff" stroke-width="1.5"/>
    <rect x="300" y="330" width="25" height="18" rx="2" fill="#39ffde" stroke="#fff" stroke-width="1.5"/>
    <rect x="480" y="322" width="35" height="22" rx="2" fill="#ffcf40" stroke="#fff" stroke-width="1.5"/>
  </g>
  <g transform="translate(180 150)" filter="url(#glow)">
    <rect x="-20" y="-20" width="40" height="25" rx="4" fill="#1a0a30" stroke="#ff4f9a" stroke-width="2"/>
    <circle cx="0" cy="-8" r="6" fill="#ff4f9a"/>
    <circle cx="0" cy="-8" r="3" fill="#f7fbff"/>
    <polygon points="-10,5 0,-25 10,5" fill="none" stroke="#ff4f9a" stroke-width="1.5"/>
  </g>
  <g transform="translate(530 165)" filter="url(#glow)">
    <rect x="-18" y="-18" width="36" height="22" rx="3" fill="#1a0a30" stroke="#39ffde" stroke-width="2"/>
    <circle cx="0" cy="-7" r="5" fill="#39ffde"/>
    <circle cx="0" cy="-7" r="2.5" fill="#f7fbff"/>
    <polygon points="-8,4 0,-22 8,4" fill="none" stroke="#39ffde" stroke-width="1.5"/>
  </g>
  <g filter="url(#trace)">
    <circle cx="360" cy="80" r="4" fill="#ffcf40" opacity=".6"/>
    <circle cx="260" cy="90" r="3" fill="#ffcf40" opacity=".5"/>
    <circle cx="460" cy="85" r="3" fill="#ffcf40" opacity=".5"/>
    <circle cx="320" cy="95" r="2" fill="#ffcf40" opacity=".4"/>
    <circle cx="400" cy="75" r="2" fill="#ffcf40" opacity=".4"/>
  </g>
  <rect x="30" y="24" width="160" height="28" rx="14" fill="#ffcf40"/><text x="110" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#0f0a1a" letter-spacing="2">RETRO · 80s</text>
  <text x="36" y="408" font-family="Arial Black,Arial,sans-serif" font-size="34" font-weight="900" fill="#f7fbff" letter-spacing="1">CASSETTE</text><text x="36" y="444" font-family="Arial Black,Arial,sans-serif" font-size="34" font-weight="900" fill="#ffcf40" letter-spacing="1">COURIER</text>
  <rect width="720" height="450" rx="28" fill="url(#scan)"/><rect x="8" y="8" width="704" height="434" rx="23" fill="none" stroke="#ff4f9a" stroke-width="3"/>
</svg>
