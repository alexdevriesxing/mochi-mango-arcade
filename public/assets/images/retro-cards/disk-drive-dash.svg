<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Disk Drive Dash key art</title><desc id="desc">Sector Squirrel navigates floppy disk tracks dodging bad sectors and collecting file fragments.</desc>
  <defs><linearGradient id="bg" x2="0" y2="1"><stop stop-color="#0a0a12"/><stop offset="1" stop-color="#120818"/></linearGradient><pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0 3.5h4" stroke="#fff" stroke-opacity=".04"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="glowHeavy"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="720" height="450" fill="url(#bg)"/>
  <g transform="translate(360 210)" fill="none" stroke-opacity=".12">
    <circle cx="0" cy="0" r="160" stroke="#39ffde" stroke-width="1"/>
    <circle cx="0" cy="0" r="130" stroke="#39ffde" stroke-width="1"/>
    <circle cx="0" cy="0" r="100" stroke="#39ffde" stroke-width="1"/>
    <circle cx="0" cy="0" r="70" stroke="#39ffde" stroke-width="1"/>
    <circle cx="0" cy="0" r="40" stroke="#39ffde" stroke-width="1"/>
  </g>
  <g transform="translate(360 210)" fill="none" stroke-opacity=".08">
    <line x1="0" y1="0" x2="160" y2="0" stroke="#39ffde" stroke-width="1"/>
    <line x1="0" y1="0" x2="-160" y2="0" stroke="#39ffde" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="160" stroke="#39ffde" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-160" stroke="#39ffde" stroke-width="1"/>
  </g>
  <g filter="url(#glowHeavy)">
    <rect x="300" y="140" width="18" height="18" fill="#ff4f9a" opacity=".8"/>
    <rect x="440" y="180" width="14" height="14" fill="#ff4f9a" opacity=".7"/>
    <rect x="250" y="240" width="12" height="12" fill="#ff4f9a" opacity=".6"/>
    <rect x="480" y="260" width="16" height="16" fill="#ff4f9a" opacity=".5"/>
    <rect x="370" y="300" width="10" height="10" fill="#ff4f9a" opacity=".6"/>
  </g>
  <g filter="url(#glow)">
    <rect x="340" y="110" width="8" height="8" fill="#39ffde"/>
    <rect x="290" y="180" width="8" height="8" fill="#39ffde"/>
    <rect x="420" y="130" width="8" height="8" fill="#39ffde"/>
    <rect x="320" y="260" width="8" height="8" fill="#39ffde"/>
    <rect x="460" y="220" width="8" height="8" fill="#39ffde"/>
    <rect x="240" y="200" width="8" height="8" fill="#39ffde"/>
    <rect x="500" y="150" width="8" height="8" fill="#39ffde"/>
  </g>
  <g transform="translate(360 210)" filter="url(#glow)">
    <rect x="-20" y="-18" width="40" height="36" rx="5" fill="#1a0a20" stroke="#ffcf40" stroke-width="2.5"/>
    <circle cx="0" cy="-4" r="7" fill="#ffcf40"/>
    <circle cx="0" cy="-4" r="3.5" fill="#f7fbff"/>
    <polygon points="-12,12 0,-20 12,12" fill="none" stroke="#ffcf40" stroke-width="2"/>
    <rect x="-14" y="12" width="28" height="4" rx="2" fill="#ffcf40"/>
  </g>
  <rect x="30" y="24" width="160" height="28" rx="14" fill="#ffcf40"/><text x="110" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#0a0a12" letter-spacing="2">RETRO · 80s</text>
  <text x="36" y="408" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#f7fbff" letter-spacing="1">DISK DRIVE</text><text x="36" y="444" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#ff4f9a" letter-spacing="1">DASH</text>
  <rect width="720" height="450" rx="28" fill="url(#scan)"/><rect x="8" y="8" width="704" height="434" rx="23" fill="none" stroke="#ffcf40" stroke-width="3"/>
</svg>
