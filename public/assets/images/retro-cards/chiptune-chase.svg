    <text x="380" y="98">♫</text>
    <text x="560" y="148">♪</text>
    <text x="270" y="168">♩</text>
    <text x="480" y="118">♬</text>
  </g>
  <g transform="translate(360 175)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="20" ry="18" fill="#1a0a30" stroke="#ff4f9a" stroke-width="2"/>
    <ellipse cx="0" cy="2" rx="14" ry="10" fill="#f7fbff" opacity=".9"/>
    <circle cx="-5" cy="-3" r="2" fill="#0a0515"/>
    <circle cx="5" cy="-3" r="2" fill="#0a0515"/>
    <path d="M-4 5 Q0 9 4 5" fill="none" stroke="#ff4f9a" stroke-width="1.5"/>
    <rect x="-16" y="-16" width="8" height="6" rx="2" fill="#ff4f9a"/>
  </g>
  <rect x="30" y="24" width="160" height="28" rx="14" fill="#ff4f9a"/><text x="110" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#fff" letter-spacing="2">RETRO · 90s</text>
  <text x="36" y="408" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#f7fbff" letter-spacing="1">CHIPTUNE</text><text x="36" y="444" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#ff4f9a" letter-spacing="1">CHASE</text>
  <rect width="720" height="450" rx="28" fill="url(#scan)"/><rect x="8" y="8" width="704" height="434" rx="23" fill="none" stroke="#ffcf40" stroke-width="3"/>
