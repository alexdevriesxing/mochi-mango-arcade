<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 450" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Pixel Plumber key art</title><desc id="desc">Piper Penguin connects leaking pixel pipes as water rises in this retro pipe-dream puzzle.</desc>
  <defs><linearGradient id="bg" x2="0" y2="1"><stop stop-color="#0a0f1a"/><stop offset="1" stop-color="#0f1a2e"/></linearGradient><pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse"><path d="M0 3.5h4" stroke="#fff" stroke-opacity=".04"/></pattern><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="waterGlow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="720" height="450" fill="url(#bg)"/>
  <rect x="0" y="300" width="720" height="150" fill="#0a1525"/>
  <line x1="0" y1="300" x2="720" y2="300" stroke="#39ffde" stroke-width="1" opacity=".3"/>
