    <rect x="420" y="100" width="30" height="30" rx="2" fill="none" stroke="#ffcf40" stroke-width="3"/>
    <rect x="500" y="160" width="30" height="30" rx="2" fill="none" stroke="#39ffde" stroke-width="3"/>
    <rect x="550" y="80" width="30" height="30" rx="2" fill="none" stroke="#ff4f9a" stroke-width="3"/>
  </g>
  <g filter="url(#glow)">
