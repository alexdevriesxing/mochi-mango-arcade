  <rect x="30" y="24" width="160" height="28" rx="14" fill="#39ffde"/><text x="110" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#0a0f1a" letter-spacing="2">RETRO · 90s</text>
  <text x="36" y="408" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#f7fbff" letter-spacing="1">PIXEL</text><text x="36" y="444" font-family="Arial Black,Arial,sans-serif" font-size="36" font-weight="900" fill="#39ffde" letter-spacing="1">PLUMBER</text>
