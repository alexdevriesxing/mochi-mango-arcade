name: Verify UI SEO production release

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/verify-ui-seo-production.yml
      - .github/verify-ui-seo-production.txt
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Deploy polished release and audit live site
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - name: Check out verification branch
        uses: actions/checkout@v4

      - name: Deploy current polished release to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy

      - name: Wait for edge propagation
        run: sleep 25

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install live browser tooling
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Run live sitewide audit
        env:
          AUDIT_BASE_URL: https://www.mochimangoarcade.com
          RUN_BROWSER_AUDIT: '1'
        run: node scripts/sitewide-audit.mjs

      - name: Run live UI SEO smoke
        env:
          SMOKE_BASE_URL: https://www.mochimangoarcade.com
        run: node scripts/ui-seo-smoke.mjs

      - name: Verify live release assets and zero defects
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const audit=JSON.parse(fs.readFileSync('audit/sitewide-latest.json','utf8'));
          const ui=JSON.parse(fs.readFileSync('.github/ui-seo-smoke-status.json','utf8'));
          const s=audit.summary;
          const failures=[];
          if(s.totalGames!==392)failures.push(`Expected 392 games, got ${s.totalGames}`);
          if(s.failedLiveUrls!==0)failures.push(`${s.failedLiveUrls} live URL failures`);
          if(s.browserRuntimeFailures!==0)failures.push(`${s.browserRuntimeFailures} runtime failures`);
          if(s.browserTestsWithErrors!==0)failures.push(`${s.browserTestsWithErrors} browser tests with errors`);
          if(s.homepageStatus!==200)failures.push(`Homepage status ${s.homepageStatus}`);
          if(s.healthStatus!==200)failures.push(`Health status ${s.healthStatus}`);
          if(s.notFoundStatus!==404)failures.push(`Unknown route status ${s.notFoundStatus}`);
          if(ui.tested!==10||ui.passed!==10||ui.failures.length)failures.push(`UI matrix ${ui.passed}/${ui.tested}`);
          if(failures.length){console.error(failures.join('\n'));process.exit(1)}
          console.log(JSON.stringify({sitewide:s,ui:{tested:ui.tested,passed:ui.passed}},null,2));
          NODE
          curl -fsS https://www.mochimangoarcade.com/ai/catalog.json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);if(j.games.length!==392)process.exit(1);console.log('AI catalogue: 392 games')})"
          curl -fsSI https://www.mochimangoarcade.com/assets/images/og/home.jpg | grep -qi 'content-type: image/jpeg'
          curl -fsSI https://www.mochimangoarcade.com/assets/images/og/games/mushmoos-moonlit-match.jpg | grep -qi 'content-type: image/jpeg'

      - name: Upload final production reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-seo-production-verification
          path: |
            audit/sitewide-latest.json
            audit/sitewide-latest.md
            .github/ui-seo-smoke-status.json
          if-no-files-found: warn
