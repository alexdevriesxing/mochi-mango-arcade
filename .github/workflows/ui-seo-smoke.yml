name: UI SEO browser smoke

on:
  pull_request:
    branches:
      - master
    paths:
      - public/**
      - scripts/ui-seo-smoke.mjs
      - .github/workflows/ui-seo-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-seo-browser-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Test polished pages on desktop and mobile
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install browser tooling
        run: |
          npm install --no-save playwright@1.55.0 http-server@14.1.1
          npx playwright install --with-deps chromium

      - name: Start local site
        run: |
          npx http-server public -p 8787 -c-1 > /tmp/mma-ui-server.log 2>&1 &
          for i in {1..30}; do curl -fsS http://127.0.0.1:8787/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/mma-ui-server.log
          exit 1

      - name: Run desktop and mobile UI checks
        env:
          SMOKE_BASE_URL: http://127.0.0.1:8787
        run: node scripts/ui-seo-smoke.mjs
