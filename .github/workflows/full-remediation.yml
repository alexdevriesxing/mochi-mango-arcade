name: Build full site remediation

on:
  pull_request:
    branches:
      - master
    paths:
      - scripts/run-remediation.txt
      - scripts/remediate-site.mjs
      - scripts/final-runtime-fixes.mjs
      - scripts/validate-site.mjs
      - public/assets/js/game-quality.js
      - .github/workflows/full-remediation.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: full-site-remediation
  cancel-in-progress: false

jobs:
  remediate:
    name: Generate and validate remediation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out remediation branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-site-remediation

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate complete remediation when needed
        run: |
          if grep -q "game-quality.js" public/assets/js/app.js && test -f public/assets/data/site-facts.json; then
            echo "Generated remediation already present; validating current branch."
          else
            node scripts/remediate-site.mjs
          fi

      - name: Apply final runtime and mobile fixes
        run: node scripts/final-runtime-fixes.mjs

      - name: Refresh package lock
        run: npm install --package-lock-only --ignore-scripts

      - name: Validate generated site
        id: validation
        continue-on-error: true
        run: |
          set +e
          node scripts/validate-site.mjs > .github/validation-status.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat .github/validation-status.txt
          exit $code

      - name: Commit generated output and validation status
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record remediation validation result" || exit 0
          git push origin HEAD:agent/full-site-remediation

      - name: Fail when validation fails
        if: steps.validation.outputs.exit_code != '0'
        run: exit 1
