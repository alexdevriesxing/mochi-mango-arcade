name: Build Helix gap guard fix

on:
  pull_request:
    branches:
      - master
    paths:
      - scripts/fix-helix-gap-guard.mjs
      - scripts/run-helix-fix.txt
      - .github/workflows/fix-helix-gap.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Apply and validate Helix fix
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-helix-gap-guard

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply Helix gap guard
        run: |
          if grep -q "const safeGaps = Array.isArray(ring.gaps)" public/assets/js/mmengine.js; then
            echo "Helix gap guard already applied."
          else
            node scripts/fix-helix-gap-guard.mjs
          fi

      - name: Validate site
        run: node scripts/validate-site.mjs

      - name: Commit generated fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Guard Helix ring gaps and test Scanline Sprint" || exit 0
          git pull --rebase origin agent/fix-helix-gap-guard
          git push origin HEAD:agent/fix-helix-gap-guard
