name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
    paths-ignore:
      - .github/deployment-status.json
      - audit/**
      - .github/workflows/sitewide-audit.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Deploy to Cloudflare
        id: deploy
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy

      - name: Record deployment result
        if: always()
        env:
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone

          payload = {
              "deployment": "cloudflare",
              "outcome": os.environ["DEPLOY_OUTCOME"],
              "source_sha": os.environ["SOURCE_SHA"],
              "source_ref": os.environ["SOURCE_REF"],
              "run_id": os.environ["RUN_ID"],
              "recorded_at": datetime.now(timezone.utc).isoformat(),
          }
          with open('.github/deployment-status.json', 'w', encoding='utf-8') as handle:
              json.dump(payload, handle, indent=2)
              handle.write('\n')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/deployment-status.json
          git commit -m "Record Cloudflare deployment result" || exit 0
          git pull --rebase origin master
          git push origin HEAD:master

      - name: Fail workflow when deployment fails
        if: steps.deploy.outcome != 'success'
        run: exit 1
