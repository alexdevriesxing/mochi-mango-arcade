name: Build gameplay depth pass

on:
  pull_request:
    branches:
      - master
    paths:
      - public/assets/js/game-campaign.js
      - scripts/apply-depth-pass.mjs
      - scripts/final-depth-fixes.mjs
      - scripts/run-depth-pass.txt
      - .github/workflows/gameplay-depth-build.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gameplay-depth-build
  cancel-in-progress: false

jobs:
  build:
    name: Apply and validate campaign depth
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out depth branch
        uses: actions/checkout@v4
        with:
          ref: agent/gameplay-depth-pass

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply campaign integration
        run: |
          if grep -q "game-campaign.js')]).then" public/assets/js/app.js; then
            echo "Campaign integration already generated."
          else
            node scripts/apply-depth-pass.mjs
          fi

      - name: Apply final campaign polish
        run: node scripts/final-depth-fixes.mjs

      - name: Validate site
        run: node scripts/validate-site.mjs

      - name: Commit generated depth pass
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply campaign and daily challenge depth pass" || exit 0
          git pull --rebase origin agent/gameplay-depth-pass
          git push origin HEAD:agent/gameplay-depth-pass
