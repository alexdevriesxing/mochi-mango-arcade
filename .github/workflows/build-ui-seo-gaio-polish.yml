name: Build UI SEO GAIO polish

on:
  pull_request:
    branches:
      - master
    paths:
      - public/assets/css/polish-2026.css
      - public/assets/js/ux-polish.js
      - scripts/apply-ui-seo-gaio-polish.mjs
      - scripts/generate-og-cards.py
      - scripts/validate-polish.mjs
      - .github/workflows/build-ui-seo-gaio-polish.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ui-seo-gaio-polish-build
  cancel-in-progress: true

jobs:
  build:
    name: Generate and validate polish pass
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out polish branch
        uses: actions/checkout@v4
        with:
          ref: agent/ui-seo-gaio-polish
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install social-card tooling
        run: python -m pip install --disable-pip-version-check pillow cairosvg

      - name: Apply UI, SEO and GAIO generation
        run: node scripts/apply-ui-seo-gaio-polish.mjs

      - name: Generate raster social cards
        run: python scripts/generate-og-cards.py

      - name: Capture validation diagnostics
        id: validation
        continue-on-error: true
        run: |
          set +e
          mkdir -p .github
          node scripts/validate-site.mjs > .github/polish-validation.log 2>&1
          SITE_STATUS=$?
          node scripts/validate-polish.mjs >> .github/polish-validation.log 2>&1
          POLISH_STATUS=$?
          cat .github/polish-validation.log
          if [ "$SITE_STATUS" -ne 0 ] || [ "$POLISH_STATUS" -ne 0 ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "failed=false" >> "$GITHUB_OUTPUT"

      - name: Commit generated output and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Generate UI SEO GAIO polish output" || exit 0
          git pull --rebase origin agent/ui-seo-gaio-polish
          git push origin HEAD:agent/ui-seo-gaio-polish

      - name: Fail when validation failed
        if: steps.validation.outputs.failed == 'true'
        run: exit 1
