name: Verify campaign production release

on:
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/verify-campaign-production.yml
      - scripts/verify-campaign-production.txt

permissions:
  contents: read

concurrency:
  group: verify-campaign-production
  cancel-in-progress: true

jobs:
  deploy-and-audit:
    name: Deploy campaign release and audit live site
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out production verification branch
        uses: actions/checkout@v4
        with:
          ref: agent/verify-campaign-production

      - name: Deploy current master release to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy

      - name: Wait for edge propagation
        run: sleep 15

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install live audit browser
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Audit deployed production site
        env:
          AUDIT_BASE_URL: https://www.mochimangoarcade.com
          RUN_BROWSER_AUDIT: '1'
        run: node scripts/sitewide-audit.mjs

      - name: Print live report
        if: always()
        run: cat audit/sitewide-latest.md || true

      - name: Upload live report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: campaign-production-audit
          path: audit/sitewide-latest.*
          if-no-files-found: error
